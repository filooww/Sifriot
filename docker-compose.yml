version: '3.8'

services:
  # MySQL 8.0 Database
  db:
    image: mysql:8.0
    container_name: literature_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-db_manager}
      MYSQL_USER: ${DB_USER:-dbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dbpass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./HTDocs:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - app_network

  # PHP 8.4 with Apache for Laravel
  web:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: literature_web
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/apache/laravel.conf:/etc/apache2/sites-available/000-default.conf
      - D:\oldI\LiteraCommon:/library:rw,Z
      # Named volumes for better performance on Windows
      - vendor_volume:/var/www/html/vendor
      - node_modules_volume:/var/www/html/node_modules
      - laravel_cache:/var/www/html/storage/framework/cache
      - laravel_logs:/var/www/html/storage/logs
      - laravel_sessions:/var/www/html/storage/framework/sessions
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    networks:
      - app_network
    working_dir: /var/www/html

  # phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: literature_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 300M
    networks:
      - app_network

  # Queue Worker for background job processing
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: literature_queue
    restart: unless-stopped
    depends_on:
      - db
      - web
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - D:\oldI\LiteraCommon:/library:rw,Z
      - vendor_volume:/var/www/html/vendor
      - laravel_cache:/var/www/html/storage/framework/cache
      - laravel_logs:/var/www/html/storage/logs
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
    networks:
      - app_network
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=600 --sleep=3 --max-jobs=1000

volumes:
  db_data:
    driver: local
  vendor_volume:
    driver: local
  node_modules_volume:
    driver: local
  laravel_cache:
    driver: local
  laravel_logs:
    driver: local
  laravel_sessions:
    driver: local

networks:
  app_network:
    driver: bridge
